# macOS release pipeline for @spikewang/grok-cli
#
# Tag v* must equal packaging/VERSION (e.g. VERSION=0.1.221 → tag v0.1.221).
#
# Pipeline:
#   1. Build darwin-arm64 + darwin-x64
#   2. GitHub Release tarballs (grok-cli-<ver>-darwin-<arm64|x64>.tar.gz)
#   3. Commit Formula/grok-cli.rb with real sha256 to main
#   4. npm publish @spikewang/grok-cli* when NPM_TOKEN is configured
#
# Archive payload: single binary named `grok`

name: Release macOS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.221). Empty uses packaging/VERSION."
        required: false
        default: ""

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PRODUCT: grok-cli
  BINARY: grok

jobs:
  meta:
    name: Resolve version
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          set -euo pipefail
          FILE_VERSION="$(tr -d '[:space:]' < packaging/VERSION)"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="v${FILE_VERSION}"
          fi
          VERSION="${TAG#v}"
          if [[ "$VERSION" != "$FILE_VERSION" ]]; then
            echo "::error::tag version ($VERSION) must match packaging/VERSION ($FILE_VERSION)"
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  build-macos:
    name: darwin-${{ matrix.npm_arch }}
    needs: meta
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Both targets on macos-14: Apple Silicon runners are plentiful;
          # macos-13 (Intel) often sits Queued for a long time.
          - os: macos-14
            target: aarch64-apple-darwin
            npm_arch: arm64
          - os: macos-14
            target: x86_64-apple-darwin
            npm_arch: x64
    steps:
      - uses: actions/checkout@v4

      - uses: arduino/setup-protoc@v3
        with:
          version: "29.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Point PROTOC at a real binary
        run: |
          set -euo pipefail
          echo "PROTOC=$(command -v protoc)" >> "$GITHUB_ENV"
          protoc --version

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-macos-${{ matrix.target }}

      - name: Build release binary
        run: cargo build -p xai-grok-pager-bin --release --target "${{ matrix.target }}"

      - name: Package tarball + stage binary
        run: |
          set -euo pipefail
          VERSION="${{ needs.meta.outputs.version }}"
          ARCH="${{ matrix.npm_arch }}"
          STEM="${PRODUCT}-${VERSION}-darwin-${ARCH}"
          TAR="${STEM}.tar.gz"

          mkdir -p dist/pkg stage
          SRC="target/${{ matrix.target }}/release/xai-grok-pager"
          test -f "$SRC"
          cp "$SRC" "dist/pkg/${BINARY}"
          cp "$SRC" "stage/xai-grok-pager"
          chmod +x "dist/pkg/${BINARY}" "stage/xai-grok-pager"
          strip -x "dist/pkg/${BINARY}" 2>/dev/null || true

          tar -C dist/pkg -czf "dist/${TAR}" "${BINARY}"
          (
            cd dist
            shasum -a 256 "${TAR}" | tee "${TAR}.sha256"
          )
          cut -d' ' -f1 "dist/${TAR}.sha256" | tr -d '\n' > "dist/${STEM}.sha256hex"
          ls -la dist stage

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PRODUCT }}-${{ needs.meta.outputs.version }}-darwin-${{ matrix.npm_arch }}
          # Upload directories (not globs) so nested layout is predictable.
          path: |
            dist/
            stage/
          if-no-files-found: error
          retention-days: 14

  github-release:
    name: GitHub Release
    needs: [meta, build-macos]
    runs-on: ubuntu-22.04
    outputs:
      arm64_sha: ${{ steps.shas.outputs.arm64_sha }}
      x64_sha: ${{ steps.shas.outputs.x64_sha }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect assets + shas
        id: shas
        run: |
          set -euo pipefail
          VERSION="${{ needs.meta.outputs.version }}"
          mkdir -p release-assets
          # Artifacts unpack as artifacts/<name>/dist/... — find regardless of nesting.
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.tar.gz.sha256' \) -print -exec cp -f {} release-assets/ \;
          ls -la release-assets
          test -f "release-assets/${PRODUCT}-${VERSION}-darwin-arm64.tar.gz"
          test -f "release-assets/${PRODUCT}-${VERSION}-darwin-x64.tar.gz"

          # Prefer pure-hex file; fall back to first field of `shasum` output.
          hex_or_sha() {
            local arch="$1"
            local hex
            hex=$(find artifacts -type f -name "${PRODUCT}-${VERSION}-darwin-${arch}.sha256hex" | head -1 || true)
            if [[ -n "${hex}" && -f "${hex}" ]]; then
              tr -d '[:space:]' < "${hex}"
              return
            fi
            local side
            side=$(find artifacts release-assets -type f -name "${PRODUCT}-${VERSION}-darwin-${arch}.tar.gz.sha256" | head -1)
            test -n "${side}"
            awk '{print $1}' "${side}"
          }

          ARM64_SHA=$(hex_or_sha arm64)
          X64_SHA=$(hex_or_sha x64)
          echo "arm64_sha=${ARM64_SHA}"
          echo "x64_sha=${X64_SHA}"
          echo "arm64_sha=${ARM64_SHA}" >> "$GITHUB_OUTPUT"
          echo "x64_sha=${X64_SHA}" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: grok-cli ${{ needs.meta.outputs.version }} (macOS)
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## grok-cli ${{ needs.meta.outputs.version }}

            Community fork of Grok Build CLI with **system-proxy** enabled
            (honors macOS System Settings proxies when env vars are unset).

            ### Install

            **npm / bun**
            ```sh
            npm install -g @spikewang/grok-cli
            # bun add -g @spikewang/grok-cli
            ```

            **Homebrew**
            ```sh
            brew tap happyfeetw/grok-cli https://github.com/happyfeetw/grok-cli
            brew install grok-cli
            # or after tap: brew upgrade grok-cli
            ```

            **GitHub Release tarball**
            ```sh
            tar -xzf grok-cli-${{ needs.meta.outputs.version }}-darwin-arm64.tar.gz   # Apple Silicon
            # tar -xzf grok-cli-${{ needs.meta.outputs.version }}-darwin-x64.tar.gz  # Intel
            install -m 755 grok ~/.local/bin/grok
            ```

            ### Assets

            | File | Platform |
            |------|----------|
            | `grok-cli-${{ needs.meta.outputs.version }}-darwin-arm64.tar.gz` | macOS Apple Silicon |
            | `grok-cli-${{ needs.meta.outputs.version }}-darwin-x64.tar.gz` | macOS Intel |

            Each archive contains a single `grok` binary. Checksums: `*.sha256`.
          files: |
            release-assets/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew-formula:
    name: Update Homebrew formula
    needs: [meta, github-release]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Rewrite Formula/grok-cli.rb
        run: |
          set -euo pipefail
          node packaging/scripts/update-formula.js \
            --version "${{ needs.meta.outputs.version }}" \
            --arm64-sha "${{ needs.github-release.outputs.arm64_sha }}" \
            --x64-sha "${{ needs.github-release.outputs.x64_sha }}"
          cat Formula/grok-cli.rb

      - name: Commit formula if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/grok-cli.rb
          if git diff --staged --quiet; then
            echo "Formula unchanged"
            exit 0
          fi
          git commit -m "chore(homebrew): bump grok-cli to ${{ needs.meta.outputs.version }}"
          git pull --rebase origin main
          git push origin HEAD:main

  npm-publish:
    name: Publish npm packages
    needs: [meta, build-macos, github-release]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble + publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${NPM_TOKEN:-}" ]]; then
            echo "::error::NPM_TOKEN secret not set; cannot publish npm packages"
            exit 1
          fi
          VERSION="${{ needs.meta.outputs.version }}"
          ARM=$(find artifacts -path "*darwin-arm64*" -name 'xai-grok-pager' -type f | head -1)
          X64=$(find artifacts -path "*darwin-x64*" -name 'xai-grok-pager' -type f | head -1)
          echo "ARM=$ARM"
          echo "X64=$X64"
          test -n "$ARM" && test -n "$X64"
          export GROK_DARWIN_ARM64="$ARM"
          export GROK_DARWIN_X64="$X64"
          node packaging/scripts/assemble-npm.js
          node packaging/scripts/publish-npm.js
