# macOS-only release builds of the Grok CLI binary.
#
# Asset naming (stable contract):
#   grok-<version>-darwin-<arch>.tar.gz
#   grok-<version>-darwin-<arch>.tar.gz.sha256
#
# where:
#   <version> = release tag without the leading "v"
#               e.g. tag v0.1.220-system-proxy.1 → 0.1.220-system-proxy.1
#   <arch>    = aarch64 | x86_64
#
# Archive contents:
#   grok   # installable binary (same name as official installs)
#
# Triggers:
#   - push of tag matching v*
#   - workflow_dispatch with optional tag input

name: Release macOS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.220-system-proxy.1). Empty = short SHA."
        required: false
        default: ""

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Package product name (user-facing). Cargo crate still builds xai-grok-pager.
  PRODUCT_NAME: grok

jobs:
  build-macos:
    name: darwin-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            arch: aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Prefer the real protoc over repo bin/protoc (dotslash wrapper).
      - name: Point PROTOC at a real binary
        run: |
          set -euo pipefail
          PROTOC_BIN="$(command -v protoc)"
          echo "Using protoc at: ${PROTOC_BIN}"
          "${PROTOC_BIN}" --version
          echo "PROTOC=${PROTOC_BIN}" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-macos-${{ matrix.target }}
          workspaces: "."

      - name: Build release binary
        run: |
          set -euo pipefail
          cargo build -p xai-grok-pager-bin --release --target "${{ matrix.target }}"

      - name: Package asset
        id: package
        run: |
          set -euo pipefail

          # Version string for filenames: strip leading "v" from the tag.
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            RAW_TAG="${{ github.ref_name }}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            RAW_TAG="${{ inputs.tag }}"
          else
            RAW_TAG="0.0.0-dev.${GITHUB_SHA::7}"
          fi
          VERSION="${RAW_TAG#v}"
          ARCH="${{ matrix.arch }}"
          ASSET_STEM="${PRODUCT_NAME}-${VERSION}-darwin-${ARCH}"
          ASSET_TAR="${ASSET_STEM}.tar.gz"
          ASSET_SHA="${ASSET_TAR}.sha256"

          mkdir -p dist/pkg
          BIN_SRC="target/${{ matrix.target }}/release/xai-grok-pager"
          test -f "$BIN_SRC"
          # Official installs ship the binary as `grok`.
          cp "$BIN_SRC" "dist/pkg/${PRODUCT_NAME}"
          chmod +x "dist/pkg/${PRODUCT_NAME}"

          # Optional strip for smaller downloads (ignore failure on thin binaries).
          strip -x "dist/pkg/${PRODUCT_NAME}" 2>/dev/null || true

          tar -C dist/pkg -czf "dist/${ASSET_TAR}" "${PRODUCT_NAME}"
          (
            cd dist
            shasum -a 256 "${ASSET_TAR}" > "${ASSET_SHA}"
          )

          ls -la dist
          echo "asset_tar=${ASSET_TAR}" >> "$GITHUB_OUTPUT"
          echo "asset_sha=${ASSET_SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "raw_tag=${RAW_TAG}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PRODUCT_NAME }}-${{ steps.package.outputs.version }}-darwin-${{ matrix.arch }}
          path: |
            dist/${{ steps.package.outputs.asset_tar }}
            dist/${{ steps.package.outputs.asset_sha }}
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    needs: build-macos
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: meta
        run: |
          set -euo pipefail
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="v0.0.0-dev.${GITHUB_SHA::7}"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=${TAG} version=${VERSION}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: |
          set -euo pipefail
          find release-assets -type f | sort
          # Expect two arches × (tar + sha256)
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: grok ${{ steps.meta.outputs.version }} (macOS)
          draft: false
          prerelease: true
          generate_release_notes: true
          body: |
            ## macOS builds — system proxy fix

            Prebuilt **macOS only** binaries of the Grok CLI (`xai-grok-pager`, shipped as `grok`) with reqwest `system-proxy` enabled.

            ### Download naming

            | Asset | Platform |
            |-------|----------|
            | `grok-${{ steps.meta.outputs.version }}-darwin-aarch64.tar.gz` | Apple Silicon (M1/M2/M3/…) |
            | `grok-${{ steps.meta.outputs.version }}-darwin-x86_64.tar.gz` | Intel Mac |

            Each archive is accompanied by a `.sha256` checksum file.

            ### Install

            ```sh
            # Apple Silicon
            tar -xzf grok-${{ steps.meta.outputs.version }}-darwin-aarch64.tar.gz
            # Intel
            # tar -xzf grok-${{ steps.meta.outputs.version }}-darwin-x86_64.tar.gz

            install -m 755 grok ~/.local/bin/grok
            # ensure ~/.local/bin is on PATH
            grok --version || true
            ```

            ### Proxy behavior (this build)

            - **macOS**: honors **System Settings → Network → Proxies** when env is unset
            - Env vars `HTTP_PROXY` / `HTTPS_PROXY` / `ALL_PROXY` / `NO_PROXY` always take precedence
            - PAC / auto-config scripts are not supported

            ### Notes

            - Linux users: build from source or set proxy env vars; this release does not ship Linux binaries.
            - Windows is not supported by this release pipeline.
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
